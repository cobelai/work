<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政府新聞稿自動排版工具</title>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 900px; margin: auto; background-color: #f0f4f8; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: background-color 0.3s;}
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; font-size: 15px;}
        #preview { margin-top: 30px; border-collapse: collapse; width: 100%; display: none; font-size: 14px;}
        #preview th, #preview td { border: 1px solid #ecf0f1; padding: 12px; text-align: left; vertical-align: top; width: 50%; white-space: pre-wrap; tab-size: 4; }
        #preview th { background-color: #f7f9fa; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 政府新聞稿一鍵 Word 排版工具</h2>
    <p class="subtitle">支援 info.gov.hk 及各大政府部門 (如 tlb.gov.hk) 的新聞稿</p>
    
    <div class="input-group">
        <label>中文新聞稿網址：</label>
        <input type="text" id="zhUrl" value="https://www.info.gov.hk/gia/general/202510/22/P2025102200401.htm" placeholder="例如: https://www.info.gov.hk/...">
    </div>
    
    <div class="input-group">
        <label>英文新聞稿網址：</label>
        <input type="text" id="enUrl" value="https://www.info.gov.hk/gia/general/202510/22/P2025102200402.htm" placeholder="例如: https://www.info.gov.hk/...">
    </div>

    <button id="convertBtn" onclick="processUrls()">📥 獲取內容並下載 Word (DOCX)</button>
    <p id="status"></p>

    <table id="preview">
        <thead>
            <tr>
                <th>中文內容預覽</th>
                <th>英文內容預覽</th>
            </tr>
        </thead>
        <tbody id="previewBody"></tbody>
    </table>
</div>

<script>
    async function fetchContent(url) {
        let htmlStr = null;
        const targetUrl = url.split('?')[0] + `?t=${Date.now()}`;
        const proxies = [
            { url: `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`, type: 'json' },
            { url: `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`, type: 'text' },
            { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`, type: 'text' }
        ];

        for (const proxy of proxies) {
            try {
                const response = await fetch(proxy.url);
                if (response.ok) {
                    htmlStr = (proxy.type === 'json') ? (await response.json()).contents : await response.text();
                    if (htmlStr && (htmlStr.includes('pressrelease') || htmlStr.includes('GIA') || htmlStr.length > 1000)) break;
                }
            } catch (e) { console.warn("代理失敗:", e.message); }
        }

        if (!htmlStr) throw new Error('連線超時，請檢查網址或更換網絡環境。');
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlStr, "text/html");

        function extractText(node) {
            if (!node) return "";
            let text = "";
            for (let child of node.childNodes) {
                if (child.nodeType === Node.TEXT_NODE) text += child.nodeValue;
                else if (child.nodeType === Node.ELEMENT_NODE) {
                    const tag = child.tagName.toLowerCase();
                    if (tag === "br") text += "\n";
                    else if (["p", "div", "h1", "h2", "h3"].includes(tag)) text += "\n" + extractText(child) + "\n";
                    else text += extractText(child);
                }
            }
            return text;
        }

        const titleNode = doc.getElementById("pr_title") || doc.querySelector("h1");
        const bodyNode = doc.getElementById("pressrelease") || doc.querySelector(".pressrelease") || doc.querySelector("#content") || doc.body;
        
        // --- 新增：抽取並替換表格代碼 ---
        const tablesData = [];
        const tables = bodyNode.querySelectorAll("table");
        tables.forEach((table, index) => {
            let rowData = [];
            const rows = table.querySelectorAll("tr");
            rows.forEach(tr => {
                let cellData = [];
                // 同時處理 th (表頭) 和 td (儲存格)
                const cells = tr.querySelectorAll("th, td");
                cells.forEach(c => {
                    cellData.push(c.innerText.trim());
                });
                rowData.push(cellData);
            });
            tablesData.push(rowData);

            // 將原本的 HTML table 替換成一個標記，等遲啲 Word 排版認得佢
            const placeholder = doc.createTextNode(`\n[[[TABLE_${index}]]]\n`);
            table.parentNode.replaceChild(placeholder, table);
        });
        // --------------------------------

        const titleText = titleNode ? extractText(titleNode).trim() : "";
        const bodyText = bodyNode ? extractText(bodyNode) : "";
        
        const paras = bodyText.split('\n').map(p => p.trimEnd()).filter(p => p.trim().length > 0);
        
        // 回傳時加入 tables 陣列
        return { title: titleText || doc.title, paras: paras, tables: tablesData };
    }

    function parseStructure(data) {
        const starIdx = data.paras.findIndex(p => {
            const c = p.replace(/\s/g, '');
            return c.length >= 5 && (/^[\*\uFF0A]+$/.test(c) || c.includes('***') || c.includes('＊＊＊'));
        });

        let title = data.title;
        let bodyStartIdx = 0;

        if (starIdx !== -1) {
            if (starIdx > 0) {
                const prevLine = data.paras[starIdx - 1];
                if (prevLine.length > 5) title = prevLine;
            }
            bodyStartIdx = starIdx + 1;
        }

        let body = data.paras.slice(bodyStartIdx);
        let firstReal = 0;
        for (let i = 0; i < Math.min(5, body.length); i++) {
            const p = body[i];
            const isDate = p.match(/\d{4}年\d{1,2}月\d{1,2}日/) || p.match(/(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)/i);
            const isMeta = p.length < 25 && (p.includes('Issued at') || p.includes('HKT') || p.includes('完') || p.includes('Ends') || p.includes('NNNN'));
            if (isDate || isMeta) firstReal = i + 1;
            else break;
        }
        
        // 傳遞 tables 屬性以供後續使用
        return { title, body: body.slice(firstReal), tables: data.tables };
    }

    async function processUrls() {
        const zhUrl = document.getElementById('zhUrl').value.trim();
        const enUrl = document.getElementById('enUrl').value.trim();
        const statusLabel = document.getElementById('status');
        const btn = document.getElementById('convertBtn');
        const previewBody = document.getElementById('previewBody');

        if (!zhUrl || !enUrl) { statusLabel.innerText = "⚠️ 請輸入中英文網址"; return; }

        try {
            btn.disabled = true;
            statusLabel.style.color = "#2980b9";
            statusLabel.innerText = "⏳ 正在分析網頁結構...";
            const [zhRaw, enRaw] = await Promise.all([fetchContent(zhUrl), fetchContent(enUrl)]);

            const zhData = parseStructure(zhRaw);
            const enData = parseStructure(enRaw);

            const zhStars = "＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊";
            const enStars = "********************************************";

            // 清理 URL 尾段的 fontSize 參數
            const cleanZhUrl = zhUrl.replace(/\?fontSize=\d+/g, "");
            const cleanEnUrl = enUrl.replace(/\?fontSize=\d+/g, "");

            // 合併：中文左，英文右
            const finalZh = [zhData.title, zhStars, cleanZhUrl, ...zhData.body];
            const finalEn = [enData.title, enStars, cleanEnUrl, ...enData.body];

            const maxLen = Math.max(finalZh.length, finalEn.length);
            previewBody.innerHTML = "";
            for (let i = 0; i < maxLen; i++) {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${finalZh[i] || ""}</td><td>${finalEn[i] || ""}</td>`;
                previewBody.appendChild(tr);
            }
            document.getElementById('preview').style.display = "table";

            const fileName = enData.title.replace(/[\\/:*?"<>|]/g, "_").trim() || "Press_Release";
            
            // 傳入 zhData.tables 和 enData.tables 給生成函數
            generateDocx(finalZh, finalEn, maxLen, fileName, zhData.tables, enData.tables);
            
            statusLabel.style.color = "#27ae60";
            statusLabel.innerText = "🎉 已成功導出英文標題 Word 檔案！";
        } catch (error) {
            statusLabel.style.color = "#e74c3c";
            statusLabel.innerText = "❌ 錯誤: " + error.message;
        } finally { btn.disabled = false; }
    }

    // 將段落砌成 Word 雙列表格，並支援巢狀表格
    function generateDocx(zhParas, enParas, maxLen, docTitle, zhTables, enTables) {
        const tableRows = [];
        
        const formatTextRules = (text) => {
            let newText = text.replace(/（/g, '(').replace(/）/g, ')');
            // 【修復 Hang 機問題】：確保這裡是 [, ] 而不是 [,\s]
            while (/(\d)[, ](\d{3})(?!\d)/.test(newText)) {
                newText = newText.replace(/(\d)[, ](\d{3})(?!\d)/g, '$1\u00A0$2');
            }
            newText = newText.replace(/(\d{3,})\s*([a-zA-Z\u4e00-\u9fa5])/g, '$1\u00A0$2');
            return newText;
        };

        const createZhParagraph = (text, isBold = false) => {
            text = formatTextRules(text);
            const runs = [];
            
            if (text.startsWith('\t')) {
                runs.push(new docx.TextRun("\t"));
                text = text.substring(1);
            }

            const tokens = text.split(/(○|\d+)/g).filter(Boolean);
            tokens.forEach(token => {
                let fontName = undefined; 
                if (token === "○") { fontName = "PMingLiU"; } 
                else if (/^\d+$/.test(token)) { fontName = "Times New Roman"; }

                runs.push(new docx.TextRun({
                    text: token, size: 20, font: fontName, characterSpacing: 20, bold: isBold
                }));
            });

            return new docx.Paragraph({ 
                children: runs, alignment: docx.AlignmentType.JUSTIFIED, keepLines: true, widowControl: true
            });
        };

        const createEnParagraph = (text, isBold = false) => {
            text = formatTextRules(text);
            const runs = [];
            if (text.startsWith('\t')) {
                runs.push(new docx.TextRun("\t"));
                text = text.substring(1);
            }
            runs.push(new docx.TextRun({
                text: text, size: 18, font: "Times New Roman", bold: isBold
            }));
            return new docx.Paragraph({ 
                children: runs, alignment: docx.AlignmentType.JUSTIFIED, keepLines: true, widowControl: true
            });
        };

        // --- 更新：用來生成巢狀表格的函數（依據內容自動調整欄寬） ---
        const createNestedTable = (tableData, isZh) => {
            const rows = tableData.map(row => {
                return new docx.TableRow({
                    cantSplit: true, // 確保表格列不會跨頁
                    children: row.map(cellText => {
                        return new docx.TableCell({
                            // 表格內部的 Padding
                            margins: { top: 60, bottom: 60, left: 60, right: 60 },
                            children: [isZh ? createZhParagraph(cellText) : createEnParagraph(cellText)]
                        });
                    })
                });
            });

            return new docx.Table({
                width: { size: 100, type: docx.WidthType.PERCENTAGE }, // 維持佔滿半邊頁面
                layout: docx.TableLayoutType.AUTOFIT, // <--- 新增呢行：要求 Word 根據內容長短自動分配每欄寬度
                rows: rows,
                // 為內部表格加上幼黑框線
                borders: {
                    top: { style: docx.BorderStyle.SINGLE, size: 1, color: "000000" },
                    bottom: { style: docx.BorderStyle.SINGLE, size: 1, color: "000000" },
                    left: { style: docx.BorderStyle.SINGLE, size: 1, color: "000000" },
                    right: { style: docx.BorderStyle.SINGLE, size: 1, color: "000000" },
                    insideHorizontal: { style: docx.BorderStyle.SINGLE, size: 1, color: "000000" },
                    insideVertical: { style: docx.BorderStyle.SINGLE, size: 1, color: "000000" },
                }
            });
        };
        // ----------------------------------

        for (let i = 0; i < maxLen; i++) {
            const zhText = zhParas[i] || "";
            const enText = enParas[i] || "";
            const isTitle = (i === 0);
            
            // 檢查該段落是否為我們插入的表格標記
            const zhTableMatch = zhText.match(/\[\[\[TABLE_(\d+)\]\]\]/);
            const enTableMatch = enText.match(/\[\[\[TABLE_(\d+)\]\]\]/);

            let zhContent, enContent;

            // 如果是表格標記，就生成表格；否則生成普通段落
            if (zhTableMatch && zhTables && zhTables[zhTableMatch[1]]) {
                zhContent = createNestedTable(zhTables[zhTableMatch[1]], true);
            } else {
                zhContent = createZhParagraph(zhText, isTitle);
            }

            if (enTableMatch && enTables && enTables[enTableMatch[1]]) {
                enContent = createNestedTable(enTables[enTableMatch[1]], false);
            } else {
                enContent = createEnParagraph(enText, isTitle);
            }
            
            tableRows.push(
                new docx.TableRow({
                    cantSplit: true,
                    children: [
                        new docx.TableCell({
                            width: { size: 50, type: docx.WidthType.PERCENTAGE },
                            margins: { top: 0, bottom: 0, left: 108, right: 108 },
                            // 注意：Word 規定 TableCell 內最後一個元素必須是 Paragraph，這裡的空 Paragraph 剛好滿足條件兼做間距
                            children: [zhContent, new docx.Paragraph({ text: "" })],
                        }),
                        new docx.TableCell({
                            width: { size: 50, type: docx.WidthType.PERCENTAGE },
                            margins: { top: 0, bottom: 0, left: 108, right: 108 },
                            children: [enContent, new docx.Paragraph({ text: "" })],
                        }),
                    ],
                })
            );
        }

        const doc = new docx.Document({
            sections: [{
                properties: {
                    page: {
                        margin: { top: 567, bottom: 567, left: 567, right: 567 },
                    },
                },
                children: [
                    new docx.Table({
                        width: { size: 100, type: docx.WidthType.PERCENTAGE },
                        layout: docx.TableLayoutType.FIXED,
                        borders: {
                            top: { style: docx.BorderStyle.NONE },
                            bottom: { style: docx.BorderStyle.NONE },
                            left: { style: docx.BorderStyle.NONE },
                            right: { style: docx.BorderStyle.NONE },
                            insideHorizontal: { style: docx.BorderStyle.NONE },
                            insideVertical: { style: docx.BorderStyle.NONE },
                        },
                        rows: tableRows,
                    }),
                ],
            }],
        });

        docx.Packer.toBlob(doc).then(blob => {
            saveAs(blob, `${docTitle}.docx`);
        });
    }
</script>
</body>
</html>
